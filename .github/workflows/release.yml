name: Release All Platforms

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      - name: Get dependencies
        run: flutter pub get
      - name: Build Android APK
        run: flutter build apk --release --split-per-abi
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev
      - name: Get dependencies
        run: flutter pub get
      - name: Build Linux app
        run: flutter build linux --release
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: build/linux/x64/release/bundle/
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      - name: Get dependencies
        run: flutter pub get
      - name: Build Windows app
        run: flutter build windows --release
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/windows/x64/runner/Release/
          retention-days: 1

  release:
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      - name: Create unified release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: SmartWallet v1.0.0 (Build ${{ github.run_number }})
          body: |
            Multi-platform release for SmartWallet
            
            **Assets:**
            - Android APKs (armeabi-v7a, arm64-v8a, x86_64)
            - Linux desktop app
            - Windows desktop app
          draft: false
          prerelease: false
          files: |
            artifacts/android-apk/*.apk
            artifacts/linux-app/**.tar.gz
            artifacts/windows-app/**.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
