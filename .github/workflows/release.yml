name: Release All Platforms

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
      - name: Get dependencies
        run: flutter pub get
      - name: Decode Keystore
        run: |
          echo "${{ secrets.STORE_FILE }}" | base64 --decode > android/app/upload-keystore.jks
          ls -la android/app/upload-keystore.jks
      - name: Build Android APK
        run: flutter build apk --release --split-per-abi
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev
      - name: Get dependencies
        run: flutter pub get
      - name: Build Linux app
        run: flutter build linux --release
      - name: Package Linux app
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../../smartwallet-linux-x64.tar.gz .
          cd ../../../../..
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: smartwallet-linux-x64.tar.gz
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
      - name: Get dependencies
        run: flutter pub get
      - name: Build Windows app
        run: flutter build windows --release
      - name: Package Windows app
        shell: pwsh
        run: |
          cd build/windows/x64/runner/Release
          Compress-Archive -Path . -DestinationPath ../../../../../../smartwallet-windows-x64.zip
          cd ../../../../..
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: smartwallet-windows-x64.zip
          retention-days: 1

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
      - name: Get dependencies
        run: flutter pub get
      - name: Build iOS app
        run: flutter build ios --release --no-codesign
      - name: Package iOS app
        run: |
          cd build/ios/iphoneos
          zip -r ../../../smartwallet-ios.zip Runner.app
          cd ../../..
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: smartwallet-ios.zip
          retention-days: 1

  release:
    needs: [build-android, build-linux, build-windows, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      - name: Create unified release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: SmartWallet v1.0.0 (Build ${{ github.run_number }})
          body: |
            Multi-platform release for SmartWallet

            **Assets:**
            - Android APKs (armeabi-v7a, arm64-v8a, x86_64)
            - iOS app
            - Linux desktop app
            - Windows desktop app
          draft: false
          prerelease: false
          files: |
            artifacts/android-apk/*.apk
            artifacts/ios-app/*.zip
            artifacts/linux-app/*.tar.gz
            artifacts/windows-app/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
