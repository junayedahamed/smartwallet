name: Release All Platforms

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
      - name: Get dependencies
        run: flutter pub get
      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > android/app/upload-keystore.jks
          ls -la android/app/upload-keystore.jks
      - name: Build Android APK
        run: flutter build apk --release --split-per-abi
        env:
          STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev
      - name: Get dependencies
        run: flutter pub get
      - name: Build Linux app
        run: flutter build linux --release
      - name: Package Linux app
        run: tar -czf smartwallet-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: smartwallet-linux-x64.tar.gz
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
      - name: Get dependencies
        run: flutter pub get
      - name: Build Windows app
        run: flutter build windows --release
      - name: Package Windows app
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath smartwallet-windows-x64-portable.zip
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: smartwallet-windows-x64-portable.zip
          retention-days: 1

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
      - name: Get dependencies
        run: flutter pub get
      - name: Build iOS app
        run: flutter build ios --release --no-codesign
      - name: Package iOS app
        run: |
          cd build/ios/iphoneos
          zip -r ../../../smartwallet-ios.zip Runner.app
          cd ../../..
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: smartwallet-ios.zip
          retention-days: 1

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
      - name: Get dependencies
        run: flutter pub get
      - name: Build macOS app
        run: flutter build macos --release
      - name: Package macOS app
        run: zip -r smartwallet-macos.zip build/macos/Build/Products/Release/smartwallet.app
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: smartwallet-macos.zip
          retention-days: 1

  release:
    needs: [build-android, build-linux, build-windows, build-ios, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr '+' '-')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      - name: Create unified release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SmartWallet v${{ steps.version.outputs.version }}
          body: |
            ## SmartWallet v${{ steps.version.outputs.version }}

            Multi-platform release built from commit `${{ github.sha }}` on `${{ github.ref_name }}`.

            ### What's New
            See [CHANGELOG.md](https://github.com/AbabilX/smartwallet/blob/main/CHANGELOG.md) for full release notes.

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | 🤖 Android (arm64) | `app-arm64-v8a-release.apk` | Recommended for most devices |
            | 🤖 Android (armeabi) | `app-armeabi-v7a-release.apk` | Older 32-bit devices |
            | 🤖 Android (x86_64) | `app-x86_64-release.apk` | Emulators |
            | 🍎 iOS | `smartwallet-ios.zip` | Requires Xcode to install |
            | 🐧 Linux | `smartwallet-linux-x64.tar.gz` | Extract and run |
            | 🪟 Windows | `smartwallet-windows-x64-portable.zip` | Extract and run `smartwallet.exe` |
            | 🍏 macOS | `smartwallet-macos.zip` | Extract and open app |

            ### Privacy
            See [PRIVACY_POLICY.md](https://github.com/AbabilX/smartwallet/blob/main/PRIVACY_POLICY.md)
          draft: false
          prerelease: false
          files: |
            artifacts/android-apk/*.apk
            artifacts/ios-app/*.zip
            artifacts/linux-app/*.tar.gz
            artifacts/windows-app/*.zip
            artifacts/macos-app/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
